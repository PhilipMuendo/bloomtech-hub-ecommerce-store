# Full-stack local/VPS deployment: MySQL + backend API + nginx-served frontend.
#
#   1. cp .env.docker.example .env   (then fill in secrets)
#   2. docker compose up -d --build
#   3. docker compose exec backend npx sequelize-cli db:migrate   (first run)
#
# Frontend is exposed on http://<host>:8080 and proxies /api to the backend.
services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-bloomtech_db}
      MYSQL_USER: ${DB_USER:-bloomtech}
      MYSQL_PASSWORD: ${DB_PASS:-bloomtech123}
    # lower_case_table_names=1 matches the case-insensitive MySQL table-name
    # behavior of Windows/macOS dev machines, where model tableName overrides
    # (e.g. `users`) and PascalCase createTable() calls in older migrations
    # (e.g. `Users`) can coexist. Linux MySQL defaults to case-sensitive table
    # names, so without this the two would be treated as different tables.
    # Must be set before the first `mysqld` initialization — cannot be changed
    # on an existing data directory.
    command: --default-authentication-plugin=mysql_native_password --lower-case-table-names=1
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Not published to the host by default — only the backend needs it.
    expose:
      - "3306"

  # Shared state store for horizontal scaling: rate-limit counters, cache, and
  # (future) the email job queue. See SCALING.md for wiring instructions.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    expose:
      - "6379"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-bloomtech_db}
      DB_USER: ${DB_USER:-bloomtech}
      DB_PASS: ${DB_PASS:-bloomtech123}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8080}
      # Optional integrations — pass through if set in .env
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
      PESAPAL_CONSUMER_KEY: ${PESAPAL_CONSUMER_KEY:-}
      PESAPAL_CONSUMER_SECRET: ${PESAPAL_CONSUMER_SECRET:-}
      PESAPAL_CALLBACK_URL: ${PESAPAL_CALLBACK_URL:-}
      PESAPAL_API_ENDPOINT: ${PESAPAL_API_ENDPOINT:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
    volumes:
      # Persist uploaded product/blog images across restarts.
      - uploads:/app/public/uploads
    expose:
      - "5000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Reuse the single GOOGLE_CLIENT_ID from .env — the frontend (Google
        # Identity Services) and backend (token audience check in
        # authController.js) must agree on the same client ID or Google
        # sign-in fails at the backend verification step.
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  mysql_data:
  redis_data:
  uploads:
