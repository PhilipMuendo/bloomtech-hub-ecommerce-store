name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  backend:
    name: Backend syntax + Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Syntax-check every backend source file (catches ESM/CJS mismatches).
      - name: Syntax check
        working-directory: backend
        run: |
          find . -path ./node_modules -prune -o \( -name '*.js' -o -name '*.cjs' \) -print \
            | xargs -n1 node --check
      # Build the production image — catches dependency/platform issues
      # (e.g. sharp requiring a newer Node than the base image provides).
      - name: Docker build
        run: docker build ./backend

  deploy:
    name: Deploy to VPS
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: SSH and redeploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/bloomtech
            git pull origin main
            docker compose up -d --build
            docker compose exec -T backend npx sequelize-cli db:migrate
